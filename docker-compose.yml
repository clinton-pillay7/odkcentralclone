services:
  postgres14:
    build:
      context: .
      dockerfile: postgres14.dockerfile
    shm_size: 512m
    volumes:
      - postgres14:/var/lib/odk/postgresql/14
    environment:
      POSTGRES_USER: odk
      POSTGRES_PASSWORD: odk
      POSTGRES_DB: odk
    restart: always

  postgres:
    # This service upgrades from postgres 9.6 to 14.
    # The legacy name must be maintained to allow access to the anonymous volume.
    build:
      context: .
      dockerfile: postgres-upgrade.dockerfile
    platform: linux/amd64
    volumes:
      - /var/lib/postgresql/data
      - postgres14:/var/lib/postgresql/14
      - ./files/postgres14/upgrade:/postgres14-upgrade
    environment:
      PGUSER: odk
      POSTGRES_INITDB_ARGS: -U odk
      POSTGRES_PASSWORD: odk
      POSTGRES_DB: odk

  mail:
    image: "registry.gitlab.com/egos-tech/smtp:1.2.2"
    volumes:
      - ./files/mail/rsa.private:/etc/exim4/dkim.key.temp:ro
    environment:
      - MAILNAME=${DOMAIN}
      - DKIM_KEY_PATH=/etc/exim4/dkim.key.temp
    restart: always

  service:
    build:
      context: .
      args:
        DB_SSL: ${DB_SSL:-}
      dockerfile: service.dockerfile
    depends_on:
      - secrets
      - postgres14
      - mail
      - pyxform
      - enketo
    volumes:
      - secrets:/etc/secrets
      - /data/transfer:/data/transfer
    env_file:
      - ".env"
    environment:
      - DOMAIN=${DOMAIN}
      - SYSADMIN_EMAIL=${SYSADMIN_EMAIL}
      - HTTPS_PORT=${HTTPS_PORT:-443}
      - NODE_OPTIONS=${SERVICE_NODE_OPTIONS:-}
      - PGHOST=${PGHOST-${DB_HOST:-postgres14}}
      - PGDATABASE=${PGDATABASE-${DB_NAME:-odk}}
      - PGUSER=${PGUSER-${DB_USER:-odk}}
      - PGPASSWORD=${PGPASSWORD-${DB_PASSWORD:-odk}}
      - PGAPPNAME=${PGAPPNAME-odkcentral}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - EMAIL_FROM=${EMAIL_FROM:-no-reply@$DOMAIN}
      - EMAIL_HOST=${EMAIL_HOST:-mail}
      - EMAIL_PORT=${EMAIL_PORT:-25}
      - EMAIL_SECURE=${EMAIL_SECURE:-false}
      - EMAIL_IGNORE_TLS=${EMAIL_IGNORE_TLS:-true}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - SENTRY_ORG_SUBDOMAIN=${SENTRY_ORG_SUBDOMAIN:-o130137}
      - SENTRY_KEY=${SENTRY_KEY:-3cf75f54983e473da6bd07daddf0d2ee}
      - SENTRY_PROJECT=${SENTRY_PROJECT:-1298632}
      - SENTRY_TRACE_RATE=${SENTRY_TRACE_RATE:-0.1}
      - S3_SERVER=${S3_SERVER:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-86400}
    command: [ "./start-odk.sh" ]
    restart: always
    logging:
      driver: local

  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    depends_on:
      - service
      - enketo
    environment:
      - DOMAIN=${DOMAIN}
      - CERTBOT_EMAIL=${SYSADMIN_EMAIL}
      - SSL_TYPE=${SSL_TYPE:-letsencrypt}
      - SENTRY_ORG_SUBDOMAIN=${SENTRY_ORG_SUBDOMAIN:-o130137}
      - SENTRY_KEY=${SENTRY_KEY:-3cf75f54983e473da6bd07daddf0d2ee}
      - SENTRY_PROJECT=${SENTRY_PROJECT:-1298632}
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
    volumes:
      - ./files/nginx/prometheus.htpasswd:/etc/nginx/prometheus.htpasswd:ro
      - ./files/local/customssl/:/etc/customssl/live/local/:ro
      - ./files/nginx/odk.conf.template:/usr/share/odk/nginx/odk.conf.template:ro
      - ./files/nginx/client-config.json.template:/usr/share/odk/nginx/client-config.json.template:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 80 || exit 1" ]
    restart: always
    logging:
      driver: local
      options:
        max-file: "30"

  pyxform:
    image: 'ghcr.io/getodk/pyxform-http:v4.4.1'
    restart: always

  secrets:
    volumes:
      - secrets:/etc/secrets
    build:
      context: .
      dockerfile: secrets.dockerfile
    command: './generate-secrets.sh'

  enketo:
    volumes:
      - secrets:/etc/secrets
    build:
      context: .
      dockerfile: enketo.dockerfile
    restart: always
    depends_on:
      - secrets
      - enketo_redis_main
      - enketo_redis_cache
    environment:
      - DOMAIN=${DOMAIN}
      - SUPPORT_EMAIL=${SYSADMIN_EMAIL}
      - HTTPS_PORT=${HTTPS_PORT:-443}

  enketo_redis_main:
    image: redis:8.6.2
    volumes:
      - ./files/enketo/redis-enketo-main.conf:/usr/local/etc/redis/redis.conf:ro
      - enketo_redis_main:/data
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    restart: always

  enketo_redis_cache:
    image: redis:8.6.2
    volumes:
      - ./files/enketo/redis-enketo-cache.conf:/usr/local/etc/redis/redis.conf:ro
      - enketo_redis_cache:/data
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    restart: always

  # ---------------------------------------------------------------------------
  # Monitoring stack
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=/prometheus/'   # ← add
      - '--web.route-prefix=/prometheus/'   # ← add
    # ports removed — access via Nginx instead
    depends_on:
      - postgres_exporter
      - redis_exporter_main
      - redis_exporter_cache
    restart: always
    logging:
      driver: local


  # Exports PostgreSQL metrics
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: "postgresql://odk:odk@postgres14:5432/odk?sslmode=disable"
    depends_on:
      - postgres14
    restart: always
    logging:
      driver: local

  # Exports metrics for the Enketo main Redis instance
  redis_exporter_main:
    image: oliver006/redis_exporter:v1.74.0
    environment:
      REDIS_ADDR: "redis://enketo_redis_main:6379"
    depends_on:
      - enketo_redis_main
    restart: always
    logging:
      driver: local

  # Exports metrics for the Enketo cache Redis instance
  redis_exporter_cache:
    image: oliver006/redis_exporter:v1.74.0
    environment:
      REDIS_ADDR: "redis://enketo_redis_cache:6379"
    depends_on:
      - enketo_redis_cache
    restart: always
    logging:
      driver: local

volumes:
  secrets:
  transfer:
  postgres14:
  enketo_redis_main:
  enketo_redis_cache:
  prometheus_data:
